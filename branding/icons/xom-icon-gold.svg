<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>OmniCoin (XOM) Icon - Gold</title>
  <desc>XOM monogram on a gold coin</desc>

  <defs>
    <!-- Gold coin gradient -->
    <radialGradient id="goldCoin" cx="38%" cy="36%" r="58%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>

    <!-- Rim highlight -->
    <radialGradient id="goldRim" cx="50%" cy="50%" r="50%">
      <stop offset="86%" stop-color="transparent"/>
      <stop offset="93%" stop-color="rgba(255,255,200,0.12)"/>
      <stop offset="100%" stop-color="rgba(80,50,0,0.35)"/>
    </radialGradient>

    <!-- Emboss effect for symbol -->
    <filter id="emboss" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset in="blur" dx="1" dy="1" result="offsetBlur"/>
      <feFlood flood-color="#8B6914" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Drop shadow -->
  <circle cx="260" cy="262" r="244" fill="rgba(80,50,0,0.2)"/>

  <!-- Coin disc -->
  <circle cx="256" cy="256" r="244" fill="url(#goldCoin)"/>

  <!-- Rim -->
  <circle cx="256" cy="256" r="244" fill="url(#goldRim)"/>

  <!-- XOM Symbol - dark embossed -->
  <g fill="none" stroke="#4A2800" stroke-width="35" stroke-linecap="round" stroke-linejoin="round" filter="url(#emboss)" opacity="0.85">
    <!-- O: Circle -->
    <circle cx="256" cy="256" r="178"/>

    <!-- X: Diagonal top-left to bottom-right -->
    <line x1="130.1" y1="130.1" x2="381.9" y2="381.9"/>

    <!-- X: Diagonal top-right to bottom-left -->
    <line x1="381.9" y1="130.1" x2="130.1" y2="381.9"/>

    <!-- M: Left vertical -->
    <line x1="130.1" y1="130.1" x2="130.1" y2="381.9"/>

    <!-- M: Right vertical -->
    <line x1="381.9" y1="130.1" x2="381.9" y2="381.9"/>
  </g>
</svg>
